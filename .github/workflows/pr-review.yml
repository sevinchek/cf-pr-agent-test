name: PR Agent (reusable)

# Central reusable workflow (stand-in del hub de la org, para probar en repos personales).
# Cada repo lo invoca con `uses:` (workflow_call) y corre en el contexto del caller.
on:
  workflow_call:
    inputs:
      project:
        description: "Nombre del proyecto que invoca (solo para observabilidad)"
        type: string
        required: true
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  pr_agent:
    # No reaccionar a acciones de bots (evita loops con el propio comentario).
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: PR-Agent review (${{ inputs.project }})
        # EVALUACIÓN build-from-source (rama PR #2). Revertir a @main al terminar.
        uses: ComunidadFeliz/plat-pr-agent-fork@PLAT/action-build-from-source
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # PR-Agent (dynaconf) lee la key de Anthropic desde el ajuste `anthropic.key`,
          # no desde ANTHROPIC_API_KEY a secas. Sin esto, litellm manda una key vacía
          # → "invalid x-api-key" aunque la credencial sea válida.
          ANTHROPIC.KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # --- Modelo ---
          config.model: "anthropic/claude-sonnet-4-6"
          config.fallback_models: '["anthropic/claude-opus-4-8"]'   # respaldo solo si el primario falla
          config.custom_model_max_tokens: "200000"
          config.custom_reasoning_model: "true"

          # --- Comportamiento: solo review (describe/improve vienen on por defecto) ---
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "false"
          pr_reviewer.persistent_comment: "true"
