name: PR Agent (reusable)

# Central reusable workflow for CF projects.
# Each project repo calls this via `uses:` (workflow_call). It runs in the
# CALLER repo's context, so PR-Agent reads and comments on the caller's PR
# using the caller's automatic GITHUB_TOKEN. No cross-repo token needed.
on:
  workflow_call:
    inputs:
      project:
        description: "Project key, e.g. insurance-back, residents-front, web"
        type: string
        required: true
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  pr_agent:
    # Skip events triggered by bots to avoid feedback loops.
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: PR Agent
    steps:
      - name: Run PR-Agent
        uses: qodo-ai/pr-agent@main
        env:
          # --- Anthropic Claude via litellm ---
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC.KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          config.model: "anthropic/claude-opus-4-8"
          config.fallback_models: '["anthropic/claude-sonnet-4-6"]'
          # claude-opus-4-8 is newer than PR-Agent's bundled model registry, so its
          # token limit must be set explicitly (claude-sonnet-4-6 is already registered).
          config.custom_model_max_tokens: "200000"
          # Opus 4.8 (4.7+ family) rejects the `temperature` param with a 400. PR-Agent
          # sends temperature:0.2 by default; this flag makes litellm_ai_handler skip
          # temperature so Opus actually runs instead of failing over to the Sonnet fallback.
          config.custom_reasoning_model: "true"
          # Scoped to the caller repo automatically via workflow_call.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Review only; keep re-reviews in one updating comment ---
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "false"
          pr_reviewer.persistent_comment: "true"
          pr_reviewer.final_update_message: "true"
          pr_reviewer.extra_instructions: "You are reviewing the '${{ inputs.project }}' project."
